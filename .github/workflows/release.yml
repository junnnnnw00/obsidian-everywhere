name: Release

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 24.x
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Verify release
        run: |
          npm run lint
          npm run typecheck
          npm run format:check
          npm test
          npm run build

      - name: Publish npm package with provenance
        run: |
          PACKAGE_NAME=$(node -p "require('./package.json').name")
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          if npm view "${PACKAGE_NAME}@${PACKAGE_VERSION}" version >/dev/null 2>&1; then
            echo "npm ${PACKAGE_NAME}@${PACKAGE_VERSION} is already published; skipping."
          else
            npm publish --access public --provenance
          fi

      - name: Install MCP Registry publisher
        run: |
          curl -fsSLO https://github.com/modelcontextprotocol/registry/releases/download/v1.8.0/mcp-publisher_linux_amd64.tar.gz
          curl -fsSLO https://github.com/modelcontextprotocol/registry/releases/download/v1.8.0/registry_1.8.0_checksums.txt
          grep '  mcp-publisher_linux_amd64\.tar\.gz$' registry_1.8.0_checksums.txt | sha256sum --check
          tar -xzf mcp-publisher_linux_amd64.tar.gz mcp-publisher

      - name: Publish official MCP Registry entry
        run: |
          SERVER_PATH=$(node -p "encodeURIComponent(require('./server.json').name)")
          SERVER_VERSION=$(node -p "require('./server.json').version")
          if curl -fsS "https://registry.modelcontextprotocol.io/v0/servers/${SERVER_PATH}/versions/${SERVER_VERSION}" >/dev/null; then
            echo "MCP Registry version ${SERVER_VERSION} is already published; skipping."
          else
            ./mcp-publisher login github-oidc
            ./mcp-publisher publish server.json
          fi
