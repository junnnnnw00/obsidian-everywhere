name: Product Hunt launch kit

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  prepare:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24.x

      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install --yes ffmpeg

      - name: Build launch kit
        run: npm run product-hunt:prepare

      - name: Upload launch kit
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: product-hunt-launch-kit-${{ github.run_number }}
          path: product-hunt/dist/
          retention-days: 30
