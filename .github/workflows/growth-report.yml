name: Growth report

on:
  workflow_dispatch:
  schedule:
    - cron: "15 3 * * 1"

permissions:
  contents: read

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - name: Collect GitHub and npm metrics
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          fetch_github() {
            curl --fail --silent --show-error \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${GITHUB_REPOSITORY}/traffic/$1" || printf '{}'
          }

          VIEWS=$(fetch_github views)
          CLONES=$(fetch_github clones)
          REFERRERS=$(fetch_github popular/referrers)
          POPULAR=$(fetch_github popular/paths)
          NPM=$(curl --fail --silent --show-error \
            "https://api.npmjs.org/downloads/point/last-week/obsidian-everywhere" || printf '{}')

          jq -n \
            --arg generated_at "$(date -u +%FT%TZ)" \
            --arg repository "${GITHUB_REPOSITORY}" \
            --argjson views "${VIEWS}" \
            --argjson clones "${CLONES}" \
            --argjson referrers "${REFERRERS}" \
            --argjson popular_paths "${POPULAR}" \
            --argjson npm "${NPM}" \
            '{generated_at, repository, views, clones, referrers, popular_paths, npm}' \
            > growth-report.json

          {
            echo "## Weekly growth report"
            echo
            echo "| Metric | Total | Unique |"
            echo "|---|---:|---:|"
            echo "| GitHub views (14d) | $(jq -r '.views.count // "n/a"' growth-report.json) | $(jq -r '.views.uniques // "n/a"' growth-report.json) |"
            echo "| GitHub clones (14d) | $(jq -r '.clones.count // "n/a"' growth-report.json) | $(jq -r '.clones.uniques // "n/a"' growth-report.json) |"
            echo "| npm downloads (7d) | $(jq -r '.npm.downloads // "n/a"' growth-report.json) | — |"
            echo
            echo "The full referrer and popular-path data is attached as a private workflow artifact."
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Preserve detailed report
        uses: actions/upload-artifact@v7
        with:
          name: growth-report-${{ github.run_number }}
          path: growth-report.json
          retention-days: 90
